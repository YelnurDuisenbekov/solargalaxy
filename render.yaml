databases:
  - name: solargalaxy-db
    plan: free
    region: frankfurt
    databaseName: solargalaxy
    user: solargalaxy

services:
  - type: web
    name: solargalaxy-api
    runtime: node
    plan: free
    region: frankfurt
    repo: https://github.com/YelnurDuisenbekov/solargalaxy
    branch: main
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push
    preDeployCommand: node prisma/seed-prod.js
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solargalaxy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: http://localhost:5173,https://client-eta-lovat-29.vercel.app
      - key: WHATSAPP_PROVIDER
        value: green
      - key: GREEN_API_URL
        value: https://api.green-api.com
      - key: GREEN_API_ID_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
