# Платный план: БД не истекает + автоматические ежедневные бэкапы Render.
# Если меняете план у уже созданной free-базы — подтвердите апгрейд в дашборде Render.
databases:
  - name: solargalaxy-db
    plan: basic-256mb
    region: frankfurt
    databaseName: solargalaxy
    user: solargalaxy

services:
  - type: web
    name: solargalaxy-api
    runtime: node
    # starter ($7/мес): сервис не «засыпает», нет холодного старта.
    plan: starter
    region: frankfurt
    repo: https://github.com/YelnurDuisenbekov/solargalaxy
    branch: main
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && node prisma/seed-prod.js
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solargalaxy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        value: http://localhost:5173,https://solargalaxy.kz,https://www.solargalaxy.kz,https://client-eta-lovat-29.vercel.app
      - key: PUBLIC_SITE_URL
        value: https://solargalaxy.kz
      - key: WHATSAPP_PROVIDER
        value: green
      - key: GREEN_API_URL
        value: https://api.green-api.com
      - key: GREEN_API_ID_INSTANCE
        sync: false
      - key: GREEN_API_TOKEN
        sync: false
